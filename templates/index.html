<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>FWI Prediction</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
	<main class="shell landing-shell">
		<section class="hero-card">
			<div class="hero-copy">
				<span class="eyebrow">Algerian Forest Fires</span>
				<h1>FWI Prediction Dashboard</h1>
				<p>
					A clean and modern Flask interface for forecasting Fire Weather Index values from weather inputs.
				</p>
				<div class="hero-actions">
					<a class="btn btn-primary" href="{{ url_for('predict_datapoint') }}">Start Prediction</a>
					<a class="btn btn-secondary" href="{{ url_for('predict_datapoint') }}">Open Form</a>
				</div>
			</div>
			<div class="hero-panel">
				<div class="stat-card">
					<span>Inputs</span>
					<strong>9 features</strong>
				</div>
				<div class="stat-card">
					<span>Model</span>
					<strong>Ridge Regressor</strong>
				</div>
				<div class="stat-card accent">
					<span>Status</span>
					<strong>Ready to predict</strong>
				</div>
			</div>
		</section>
	</main>
</body>
</html>
